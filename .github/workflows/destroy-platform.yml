name: Destroy Platform

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to continue"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'llm-gateway/terraform.tfstate' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  CLUSTER_ADMIN_PRINCIPAL_ARN: ${{ vars.CLUSTER_ADMIN_PRINCIPAL_ARN }}

jobs:
  destroy:
    name: Destroy Platform
    if: ${{ inputs.confirm == 'DESTROY' }}
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: Infra/platform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Verify Terraform backend resources exist
        run: |
          aws s3api head-bucket --bucket "$TF_STATE_BUCKET"
          aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" >/dev/null

      - name: Validate required configuration
        run: |
          missing=0

          for name in AWS_REGION TF_STATE_BUCKET TF_LOCK_TABLE CLUSTER_ADMIN_PRINCIPAL_ARN; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing variable::$name is not configured in GitHub Actions variables"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - name: Terraform init
        run: |
          cat > terraform.auto.tfvars <<EOF
          cluster_admin_principal_arn = "$CLUSTER_ADMIN_PRINCIPAL_ARN"
          EOF
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"

      - name: Read cluster name
        id: cluster
        run: echo "name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ steps.cluster.outputs.name }}" --region "$AWS_REGION"

      - name: Delete Kubernetes application resources
        run: |
          kubectl delete svc llm-gateway --ignore-not-found=true
          kubectl delete deployment llm-gateway --ignore-not-found=true

      - name: Terraform destroy
        run: terraform destroy -auto-approve
