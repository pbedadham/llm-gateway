name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "App/**"
      - "Infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'llm-gateway' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'llm-gateway/terraform.tfstate' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest

    outputs:
      app_code: ${{ steps.filter.outputs.app_code }}
      app_k8s: ${{ steps.filter.outputs.app_k8s }}
      platform: ${{ steps.filter.outputs.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app_code:
              - 'App/app/**'
              - 'App/Dockerfile'
              - 'App/requirements.txt'
            app_k8s:
              - 'App/k8s/**'
            platform:
              - 'Infra/platform/**'

  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    environment: dev
    needs: changes
    if: |
      needs.changes.outputs.app_code == 'true' ||
      needs.changes.outputs.app_k8s == 'true' ||
      needs.changes.outputs.platform == 'true' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Validate required configuration
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          missing=0

          for name in AWS_REGION TF_STATE_BUCKET TF_LOCK_TABLE; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing variable::$name is not configured in GitHub Actions variables"
              missing=1
            fi
          done

          for name in AWS_ROLE_ARN OPENAI_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not configured in GitHub Actions secrets"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  infra-deploy:
    name: Infra Deploy
    runs-on: ubuntu-latest
    environment: dev
    needs:
      - changes
      - preflight
    if: needs.changes.outputs.platform == 'true'

    outputs:
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}

    defaults:
      run:
        working-directory: Infra/platform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Verify Terraform backend resources exist
        run: |
          aws s3api head-bucket --bucket "$TF_STATE_BUCKET"
          aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" >/dev/null

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"

      - name: Terraform apply
        run: terraform apply -auto-approve

      - name: Read Terraform outputs
        id: tf_outputs
        run: echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

  app-deploy:
    name: App Deploy
    runs-on: ubuntu-latest
    environment: dev
    needs:
      - changes
      - preflight
      - infra-deploy
    if: |
      always() &&
      (needs.changes.outputs.app_code == 'true' || needs.changes.outputs.app_k8s == 'true' || needs.changes.outputs.platform == 'true') &&
      (needs.infra-deploy.result == 'success' || needs.infra-deploy.result == 'skipped')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - name: Read platform Terraform outputs
        id: cluster
        working-directory: Infra/platform
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"
          echo "name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

      - name: Verify EKS cluster exists
        run: aws eks describe-cluster --name "${{ steps.cluster.outputs.name }}" --region "$AWS_REGION" >/dev/null

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: image
        run: |
          if [ "${{ needs.changes.outputs.app_code }}" = "true" ]; then
            echo "uri=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "uri=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        if: needs.changes.outputs.app_code == 'true'
        uses: docker/build-push-action@v6
        with:
          context: App
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ steps.cluster.outputs.name }}" --region "$AWS_REGION"

      - name: Install NVIDIA device plugin
        run: |
          helm repo add nvdp https://nvidia.github.io/k8s-device-plugin
          helm repo update
          kubectl create namespace nvidia --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install nvdp nvdp/nvidia-device-plugin --namespace nvidia

      - name: Create application secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          kubectl create secret generic llm-secrets \
            --from-literal=api-key="$OPENAI_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f App/k8s/service.yml
          kubectl apply -f App/k8s/deployment.yml

      - name: Update deployment image
        run: kubectl set image deployment/llm-gateway llm-gateway=${{ steps.image.outputs.uri }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/llm-gateway --timeout=10m
